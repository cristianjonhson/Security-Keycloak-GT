
services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    profiles: ["dev"]
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:?set KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD}
    command: ["start-dev"]
